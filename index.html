<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VILLAINS DESCENDANTS — Главная</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ВИНИЛ -->
<div class="vinyl" id="vinyl">
  <img src="first_block_home_page/пластинка.png" alt="">
</div>

<!-- FIRST -->
<section class="first-block">
  <header class="site-header">
    <nav class="header-inner">
      <a class="header-link" href="#">ВОЙТИ</a>
      <a class="header-link" href="#">МИР</a>
      <a class="header-link" href="#">ПРАВИЛА</a>
      <a class="header-link" href="#">СПИСОК</a>
    </nav>
  </header>

  <div class="content-center">
    <h1 class="title-first">VILLAINS DESCENDANTS</h1>
    <p class="subtitle-first">TW / GI / HSR</p>

    <div class="start-wrap">
      <button id="startBtn" class="start-btn">НАЧАТЬ</button>
    </div>
  </div>
</section>

<!-- THIRD -->
<section class="third-block" id="faculties">

  <h1 class="title">ВЫБЕРИ СВОЙ ПУТЬ!</h1>

  <div class="card">

    <img class="background-card" src="third_block_home_page/подкладка.png">

    <img class="character" id="character"
         src="third_block_home_page/персонаж 1.png">

    <div class="card-text" id="cardText">
      <h3 class="faculty" id="faculty">Heartslabyul</h3>

      <p class="description-small" id="descSmall"></p>
      <p class="description-big" id="descBig"></p>
    </div>

    <div class="button-box">
      <img src="third_block_home_page/кнопка.png" class="button-bg">
      <img src="third_block_home_page/мини герб 1.png" class="button-icon" id="miniHerb">
      <span class="button-text">подробнее</span>
    </div>

    <div class="herbs">
      <img src="third_block_home_page/герб 1.png" data-id="1">
      <img src="third_block_home_page/герб 2.png" data-id="2">
      <img src="third_block_home_page/герб 3.png" data-id="3">
      <img src="third_block_home_page/герб 4.png" data-id="4">
      <img src="third_block_home_page/герб 5.png" data-id="5">
      <img src="third_block_home_page/герб 6.png" data-id="6">
      <img src="third_block_home_page/герб 7.png" data-id="7">
    </div>

  </div>
</section>

<audio id="bgMusic" src="music.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
