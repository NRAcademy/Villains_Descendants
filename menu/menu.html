<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=1350, user-scalable=no">
    <title>Зельеварение — Меню</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
<!-- ================= ЗАГРУЗОЧНЫЙ ЭКРАН ================= -->

<div id="loading-screen">
    <div class="coffins-wrapper">
        <img src="../загрузка/первый_гроб.png" class="coffin active" id="coffin-1">
        <img src="../загрузка/второй_гроб.png" class="coffin dark" id="coffin-2">
        <img src="../загрузка/третий_гроб.png" class="coffin dark" id="coffin-3">
    </div>
    <div id="loading-text"></div>
</div>

    <header class="site-header" role="banner">
        <nav class="header-inner" aria-label="Главное меню">
            <a class="header-link" href="https://nracademy.github.io/Villains_Descendants/Система%20обучения/меню/lessons.html">НАЗАД</a>
            <a class="header-link" id="open-leaderboard" href="#">ИНСТРУКЦИЯ</a>
            <a class="header-link" href="https://vk.com/villains_descendants" target="_blank" rel="noopener noreferrer">СПРАВОЧНИК</a>
            <a class="header-link" href="https://vk.com/veneno_bianco" target="_blank" rel="noopener noreferrer">ПОМОЩЬ</a>
        </nav>
    </header>

    <main class="game-container">
        <section class="alchemy-section" aria-label="Зона алхимии">
            <div class="orbit-bg"></div>
            <div class="center-stand"></div>
            
            <div class="slots-rotator">
                <!-- Лучше использовать цикл в JS для генерации, но если верстка статична: -->
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
            </div>
        </section>

        <section class="menu-section" aria-label="Список зелий">
            <div class="potions-grid">
                <div class="potion-item active-potion" id="potion-talkative">
                    <div class="potion-ribbon"></div>
                </div>
                <!-- Можно сократить повторения, если использовать JS -->
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
            </div>
        </section>
    </main>

    <script src="menu.js"></script>
</body>
</html>
