<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зельеварение — Меню</title>
    <link rel="stylesheet" href="menu.css">
</head>

<body>

<!-- ================= ПОВОРОТ УСТРОЙСТВА ================= -->
<div id="rotate-warning">
    Пожалуйста, поверните устройство горизонтально
</div>

<!-- ================= РЕГИСТРАЦИЯ ================= -->
<div id="registration-overlay" class="reg-overlay">
    <div class="reg-window">
        <form id="registration-form" class="reg-form">

            <div class="input-container name-container">
                <input type="text" id="char-name" class="magic-input"
                       placeholder="Например, Альбедо"
                       required autocomplete="off">
            </div>

            <div class="input-container profile-container">
                <input type="text" id="vk-profile" class="magic-input"
                       placeholder="id1234567 или короткое имя"
                       required autocomplete="off">
            </div>

            <div id="error-message" class="error-text"></div>

            <button type="submit" id="submit-reg" class="btn-ready"></button>
        </form>
    </div>
</div>

<!-- ================= ШАПКА ================= -->
<header class="site-header" role="banner">
    <nav class="header-inner" aria-label="Главное меню">

        <a class="header-link" href="../../Система%20обучения/меню/lessons.html">НАЗАД</a>

        <a class="header-link" id="open-leaderboard" href="#">РЕЙТИНГ</a>

        <a class="header-link" href="https://vk.com/villains_descendants" target="_blank">ГРУППА</a>

        <a class="header-link" href="https://vk.com/veneno_bianco" target="_blank">ПОМОЩЬ</a>

        <button id="toggle-header-btn" class="toggle-btn">▼</button>

    </nav>
</header>

<!-- ================= ИГРОВАЯ СЦЕНА ================= -->
<div class="game-container">

    <!-- АЛХИМИЯ -->
    <div class="alchemy-section">
        <div class="orbit-bg"></div>
        <div class="center-stand"></div>

        <div class="slots-rotator">
            <div class="cell-slot"></div>
            <div class="cell-slot"></div>
            <div class="cell-slot"></div>
            <div class="cell-slot"></div>
            <div class="cell-slot"></div>
            <div class="cell-slot"></div>
        </div>
    </div>

    <!-- МЕНЮ ЗЕЛИЙ -->
    <div class="menu-section">
        <div class="potions-grid">

            <div class="potion-item active-potion" id="potion-talkative">
                <div class="potion-ribbon"></div>
            </div>

            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>
            <div class="potion-item locked"></div>

        </div>
    </div>

</div>

<!-- ================= РЕЙТИНГ ================= -->
<div id="leaderboard-overlay" class="modal-overlay" style="display: none;">
    <div class="leaderboard-window">

        <div class="leaderboard-content" id="leaderboard-list">

            <div class="rank-card rank-gold">
                <div class="rank-name">Игрок 1</div>
                <div class="rank-time">00:02</div>
            </div>

            <div class="rank-card rank-silver">
                <div class="rank-name">Игрок 2</div>
                <div class="rank-time">00:05</div>
            </div>

            <div class="rank-card rank-default">
                <div class="rank-name">Игрок 3</div>
                <div class="rank-time">00:10</div>
            </div>

        </div>

    </div>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="menu.js"></script>

</body>
</html>
