<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зельеварение — Меню</title>
    <link rel="stylesheet" href="menu.css">
</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->
    <header class="site-header" role="banner">
        <nav class="header-inner" aria-label="Главное меню">

            <a class="header-link" href="../../Система%20обучения/меню/lessons.html">
                НАЗАД
            </a>

            <a class="header-link" href="https://vk.com/villains_descendants" target="_blank">
                ГРУППА
            </a>

            <a class="header-link" href="https://vk.com/veneno_bianco" target="_blank">
                ПОМОЩЬ
            </a>

        </nav>
    </header>

    <!-- =========================
         GAME CONTAINER
    ========================== -->
    <div class="game-container">

        <!-- АЛХИМИЧЕСКИЙ КРУГ -->
        <div class="alchemy-section">
            <div class="orbit-bg"></div>
            <div class="center-stand"></div>

            <div class="slots-rotator">

                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>
                <div class="cell-slot"></div>

            </div>
        </div>

        <!-- МЕНЮ ЗЕЛИЙ -->
        <div class="menu-section">

            <div class="potions-grid">

                <div class="potion-item active-potion" id="potion-talkative">
                    <div class="potion-ribbon"></div>
                </div>

                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>
                <div class="potion-item locked"></div>

            </div>

        </div>

    </div>

    <!-- =========================
         UNIFIED NOTIFICATION MODAL
    ========================== -->
    <div id="notification-modal" class="notification-overlay" style="display:none;">

        <div class="notification-content">

            <img id="notification-img" class="notification-img" alt="notification">

            <button id="notification-btn" class="notification-btn"></button>

        </div>

    </div>

    <!-- =========================
         SCRIPTS
    ========================== -->
    <script src="menu.js"></script>

</body>
</html>
