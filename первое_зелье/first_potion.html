<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зельеварение</title>

    <link rel="stylesheet" href="first_potion.css">
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="фон.mp4" type="video/mp4">
</video>

<!-- COUNTDOWN -->
<div class="countdown-overlay" id="countdown-overlay">
    <div id="countdown-text">3</div>
</div>

<!-- WAIT -->
<div class="wait-modal-overlay" id="wait-modal" style="display:none;">
    <div class="wait-modal-content">
        <img src="../уведомление/ожидание.png" class="wait-bg">
        <button id="understand-btn" class="understand-btn"></button>
    </div>
</div>

<!-- HEADER -->
<header class="site-header">
    <button id="toggle-header-btn">▼</button>

    <nav class="header-inner">
        <a class="header-link" href="#">НАЗАД</a>
        <a class="header-link" href="#">ГЛАВНАЯ</a>
        <a class="header-link" href="#">ГРУППА</a>
        <a class="header-link" href="#">ВОПРОСЫ</a>
    </nav>
</header>

<!-- GAME -->
<div class="game-container">

    <div class="alchemy-section">
        <div class="center-stand"></div>

        <div id="slots-rotator" class="slots-rotator">

            <div class="cell-slot grayscale" data-ingredient="badyan"></div>
            <div class="cell-slot grayscale" data-ingredient="mandrake"></div>
            <div class="cell-slot grayscale" data-ingredient="honey_water"></div>
            <div class="cell-slot grayscale" data-ingredient="mint"></div>
            <div class="cell-slot grayscale" data-ingredient="toadstool"></div>
            <div class="cell-slot grayscale" data-ingredient="hellebore"></div>

        </div>
    </div>

    <div class="menu-section">

        <div class="ingredients-slots-row">
            <div class="chosen-slot" id="slot-0"></div>
            <div class="chosen-slot" id="slot-1"></div>
            <div class="chosen-slot" id="slot-2"></div>
            <div class="chosen-slot" id="slot-3"></div>

            <button id="ready-btn"></button>
        </div>

        <div id="game-timer" class="game-timer">00:30</div>

    </div>

</div>

<div id="loading-overlay" class="loading-overlay">
    <div id="loading-text"></div>
</div>

<div id="fail-gif-container" class="fail-gif-overlay"></div>

<script src="first_potion.js"></script>
</body>
</html>
